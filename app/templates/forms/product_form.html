{% extends 'base.html' %}
{% block title %}{{ 'Edit Product' if product else 'New Product' }}{% endblock %}
{% block content %}
<section class="page-head">
  <h1>{{ 'Edit Product' if product else 'New Product' }}</h1>
</section>
<form class="grid-form" method="post" novalidate>
  <label>Name<input type="text" name="name" required minlength="2" value="{{ product.name if product else '' }}"></label>
  <label>Price<input type="number" step="0.01" min="0" name="price" required value="{{ product.price if product else '' }}"></label>
  <label>Size
    <select name="size" required>
      {% for size in ['XS','S','M','L','XL'] %}
      <option value="{{ size }}" {% if product and product.size == size %}selected{% endif %}>{{ size }}</option>
      {% endfor %}
    </select>
  </label>
  <label>Color<input type="color" name="color" required pattern="^#[0-9A-Fa-f]{6}$" value="{{ product.color if product else '#0099ff' }}"></label>
  <label>Image URL<input type="url" name="image" value="{{ product.image if product else '' }}"></label>
  <div class="form-actions">
    <button type="submit" class="btn">Save</button>
    <a href="{{ url_for('main.products') }}" class="btn ghost">Cancel</a>
  </div>
</form>
{% endblock %}
